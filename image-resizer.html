<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Resizer | FileCraft</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png" alt="Logo">

<div>
<h2>FileCraft</h2>
<p>All-in-One File Tools</p>
</div>

</div>

<nav>
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="index.html#how-it-works">How It Works</a>
<a href="index.html#contact">Contact</a>
</nav>

</header>

<section class="tool-page">

<h1>Image Resizer</h1>

<p>
Resize images to any custom width and height.
</p>

<div class="upload-box">

<i class="fa-solid fa-expand"></i>

<h3>Select Image</h3>

<p>Upload JPG, PNG or WEBP</p>

<input
type="file"
id="imageInput"
accept="image/*">

</div>

<div class="preview-box">

<img
id="previewImage"
alt="Preview">

</div>

<div style="margin-top:30px;">

<label>Select Preset:</label>

<br><br>

<select id="presetSelect">

<option value="">Custom Size</option>

<option value="1080x1080">
Instagram Post (1080×1080)
</option>

<option value="1080x1920">
Instagram Story (1080×1920)
</option>

<option value="1200x630">
Facebook Post (1200×630)
</option>

<option value="1280x720">
YouTube Thumbnail (1280×720)
</option>

<option value="2560x1440">
YouTube Banner (2560×1440)
</option>

<option value="500x500">
WhatsApp DP (500×500)
</option>

<option value="413x531">
Passport Photo (413×531)
</option>

</select>

<br><br>

<input
type="number"
id="widthInput"
placeholder="Width (px)">

<input
type="number"
id="heightInput"
placeholder="Height (px)">

</div>

<div class="btn-group">

<button
id="resizeBtn"
class="convert-btn">

Resize Image

</button>

</div>

<div id="resizedPreview"></div>

<div
id="downloadArea"
style="margin-top:30px;">
</div>

</section>

<script>

let selectedImage = null;

const imageInput =
document.getElementById("imageInput");

const previewImage =
document.getElementById("previewImage");

imageInput.addEventListener("change",(e)=>{

selectedImage =
e.target.files[0];

if(!selectedImage) return;

previewImage.src =
URL.createObjectURL(selectedImage);

previewImage.style.display =
"block";

const img =
new Image();

img.src =
URL.createObjectURL(selectedImage);

img.onload = function(){

document
.getElementById("widthInput")
.value =
img.width;

document
.getElementById("heightInput")
.value =
img.height;

};

});
document
.getElementById("presetSelect")
.addEventListener("change",function(){

if(!this.value) return;

const size =
this.value.split("x");

document
.getElementById("widthInput")
.value = size[0];

document
.getElementById("heightInput")
.value = size[1];

});
document
.getElementById("resizeBtn")
.addEventListener("click",()=>{

if(!selectedImage){

alert("Please select an image.");

return;

}

const reader =
new FileReader();

reader.readAsDataURL(selectedImage);

reader.onload = function(event){

const img =
new Image();

img.src =
event.target.result;

img.onload = function(){

const newWidth =
parseInt(
document
.getElementById("widthInput")
.value
);

const newHeight =
parseInt(
document
.getElementById("heightInput")
.value
);

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width =
newWidth;

canvas.height =
newHeight;

ctx.drawImage(
img,
0,
0,
newWidth,
newHeight
);

const resizedURL =
canvas.toDataURL(
"image/jpeg"
);

document
.getElementById("resizedPreview")
.innerHTML = `

<h3>Resized Preview</h3>

<img
src="${resizedURL}"
style="
max-width:100%;
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
margin-top:15px;
">

<p style="margin-top:15px;">
<b>Size:</b>
${newWidth} × ${newHeight}
</p>

`;

document
.getElementById("downloadArea")
.innerHTML = `

<a
href="${resizedURL}"
download="resized-image.jpg"
class="convert-btn">

Download Resized Image

</a>

`;

};

};

});

</script>

</body>
</html>
