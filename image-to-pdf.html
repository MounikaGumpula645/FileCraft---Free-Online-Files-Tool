<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF Converter | FileCraft</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png" alt="FileCraft Logo">

<div>
<h2>FileCraft</h2>
<p>All-in-One File Tools</p>
</div>

</div>

<nav>
<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>
<a href="index.html#how-it-works">How It Works</a>
<a href="index.html#contact">Contact</a>
</nav>

</header>

<section class="tool-page">

<h1>Image to PDF Converter</h1>

<p>
Convert JPG, PNG, JPEG and other image formats into a PDF instantly.
</p>

<div class="upload-box">

<i class="fa-solid fa-cloud-arrow-up"></i>

<h3>Select Image</h3>

<p>Choose an image to convert into PDF</p>

<input
type="file"
id="imageInput"
accept="image/*"
multiple>

</div>

<div
id="previewContainer"
class="preview-box">
</div>

<div class="btn-group">

<button
id="convertBtn"
class="convert-btn">

Convert To PDF

</button>
<div id="statusText"></div>
</div>

</section>

<script>

let selectedImages = [];

const imageInput =
document.getElementById("imageInput");

const previewContainer =
document.getElementById("previewContainer");

imageInput.addEventListener("change",(e)=>{

selectedImages =
Array.from(e.target.files);

previewContainer.innerHTML = "";

selectedImages.forEach(file=>{

const img =
document.createElement("img");

img.src =
URL.createObjectURL(file);

img.style.width =
"150px";

img.style.margin =
"10px";

img.style.borderRadius =
"12px";

previewContainer.appendChild(img);

});

});

document
.getElementById("convertBtn")
.addEventListener("click",async()=>{
const btn =
document.getElementById("convertBtn");

btn.disabled = true;

btn.innerText =
"Converting...";

document
.getElementById("statusText")
.innerHTML =
`Converting ${selectedImages.length} image(s)...`;

if(selectedImages.length===0){

alert(
"Please select at least one image."
);

return;

}

const { jsPDF } =
window.jspdf;

const pdf =
new jsPDF();

for(
let i=0;
i<selectedImages.length;
i++
){

const file =
selectedImages[i];

const imageData =
await new Promise(resolve=>{

const reader =
new FileReader();

reader.onload =
e=>resolve(e.target.result);

reader.readAsDataURL(file);

});

const img =
await new Promise(resolve=>{

const image =
new Image();

image.onload =
()=>resolve(image);

image.src =
imageData;

});

if(i>0){

pdf.addPage();

}

const pdfWidth =
pdf.internal.pageSize.getWidth();

const pdfHeight =
(pdfWidth*img.height)
/img.width;

pdf.addImage(
img,
"JPEG",
0,
0,
pdfWidth,
pdfHeight
);

}

pdf.save(
"FileCraft-PDF.pdf"
);
btn.disabled = false;

btn.innerText =
"Convert To PDF";

document
.getElementById("statusText")
.innerHTML =
"✓ Download Started";

});

</script>


</body>
</html>
