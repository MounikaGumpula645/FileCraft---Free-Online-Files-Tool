<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image to PDF - FileCraft</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/image-to-pdf.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body>

    <main class="pdf-tool">

        <!-- HEADER -->

        <section class="tool-header">
            <h1>Image to PDF Converter</h1>
            <p>
                Convert JPG, PNG, WEBP, GIF and other images into a single PDF.
            </p>
        </section>

        <!-- UPLOAD -->

        <section class="upload-section">

            <div id="dropZone" class="drop-zone">

                <div class="drop-content">

                    <div class="upload-icon">
                        📄
                    </div>

                    <h2>Drop Images Here</h2>

                    <p>
                        Drag & Drop Images or Select Files
                    </p>

                    <button id="selectBtn" class="primary-btn">
                        Select Images
                    </button>

                    <input
                        type="file"
                        id="imageInput"
                        accept="image/*"
                        multiple
                        hidden
                    >

                </div>

            </div>

        </section>

        <!-- STATS -->

        <section class="stats-section">

            <div class="stat-card">
                <span id="imageCount">0</span>
                <small>Images</small>
            </div>

            <div class="stat-card">
                <span id="totalSize">0 MB</span>
                <small>Total Size</small>
            </div>

        </section>

        <!-- SETTINGS -->

        <section class="settings-section">

            <h3>PDF Settings</h3>

            <div class="settings-grid">

                <div class="setting">
                    <label for="pageSize">Page Size</label>
<select id="pageSize">
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                        <option value="legal">Legal</option>
                    </select>
                </div>

                <div class="setting">
                    <label for="orientation">Orientation</label>
<select id="orientation">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                        <option value="auto">Auto</option>
                    </select>
                </div>

                <div class="setting">
                   <label for="quality">Image Quality</label>
<select id="quality">
                        <option value="1">High</option>
                        <option value="0.85">Medium</option>
                        <option value="0.7">Low</option>
                    </select>
                </div>

                <div class="setting">
                   <label for="margin">Margin</label>
<select id="margin">
                        <option value="0">0 px</option>
                        <option value="5">5 px</option>
                        <option value="10" selected>10 px</option>
                        <option value="20">20 px</option>
                    </select>
                </div>

            </div>

        </section>

        <!-- ACTIONS -->

        <section class="action-section">

            <button id="clearBtn" class="secondary-btn">
                Clear All
            </button>

            <button id="convertBtn" class="convert-btn">
                Convert to PDF
            </button>

        </section>

        <!-- PROGRESS -->

        <section class="progress-section">

            <div class="progress-bar">

                <div id="progressFill"></div>

            </div>

            <div id="progressText">
                Ready
            </div>

        </section>

        <!-- PREVIEW -->

        <section class="preview-section">

            <div class="preview-header">

                <h3>Selected Images</h3>

                <span id="previewCount">
                    0 Files
                </span>

            </div>

            <div id="previewGrid" class="preview-grid">

                <!-- thumbnails -->

            </div>

        </section>
</main>

<div id="loadingOverlay" class="loading-overlay hidden">

    <div class="loading-card">

        <div class="spinner"></div>

        <h3 id="loadingTitle">
            Creating PDF
        </h3>

        <p id="loadingStatus">
            Preparing...
        </p>

        <div class="overlay-progress">

            <div id="overlayProgressFill"></div>

        </div>

    </div>

</div>
<div id="toast"></div>
<script src="js/image-to-pdf.js"></script>

</body>
</html>
