<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG to PDF Converter | FileCraft</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>
<!-- Navbar -->

<header>

    <div class="logo">

        <img src="images/logo.png" alt="Logo">

        <div>
            <h2>FileCraft</h2>
            <p>All-in-One File Tools</p>
        </div>

    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#tools">Tools</a>
        <a href="index.html#how-it-works">How It Works</a>
        <a href="index.html#contact">Contact</a>
    </nav>

</header>

<!-- Tool Section -->

<section class="tool-page">

    <h1>JPG to PDF Converter</h1>

    <p>
        Convert JPG and JPEG images into PDF instantly.
    </p>

    <div class="upload-box">

        <i class="fa-solid fa-file-image"></i>

        <h3>Select JPG Image</h3>

        <p>Choose a JPG/JPEG image</p>

        <input
            type="file"
            id="imageInput"
            accept=".jpg,.jpeg">

    </div>

    <div class="preview-box">

        <img
            id="previewImage"
            alt="Preview Image">

    </div>

    <div class="btn-group">

        <button
            id="convertBtn"
            class="convert-btn">

            Convert To PDF

        </button>

    </div>

</section>

<script>

    let selectedImage = null;

    const imageInput =
        document.getElementById("imageInput");

    const previewImage =
        document.getElementById("previewImage");

    imageInput.addEventListener("change", (e) => {

        const file = e.target.files[0];

        if (!file) return;

        selectedImage = file;

        previewImage.src =
            URL.createObjectURL(file);

        previewImage.style.display =
            "block";

    });

    document
        .getElementById("convertBtn")
        .addEventListener("click", () => {

            if (!selectedImage) {

                alert("Please select a JPG image first.");

                return;

            }

            const reader =
                new FileReader();

            reader.readAsDataURL(selectedImage);

            reader.onload = function () {

                const { jsPDF } = window.jspdf;

                const pdf =
                    new jsPDF();

                const img =
                    new Image();

                img.src =
                    reader.result;

                img.onload = function () {

                    const pdfWidth =
                        pdf.internal.pageSize.getWidth();

                    const pdfHeight =
                        (pdfWidth * img.height) /
                        img.width;

                    pdf.addImage(
                        img,
                        "JPEG",
                        0,
                        0,
                        pdfWidth,
                        pdfHeight
                    );

                    pdf.save(
                        "FileCraft-JPG-to-PDF.pdf"
                    );

                };

            };

        });

</script>

</body>

</html>
